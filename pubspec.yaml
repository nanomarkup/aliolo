name: aliolo
description: "Aliolo - Your Logic Ally for visual learning."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  json_annotation: ^4.9.0
  image_picker: ^1.2.1
  crypto: ^3.0.7
  uuid: ^4.5.3
  intl: ^0.19.0
  window_manager: ^0.5.1
  audioplayers: ^6.6.0
  url_launcher: ^6.3.2
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5
  package_info_plus: ^8.2.1
  provider: ^6.1.5+1
  get_it: ^9.2.1
  supabase_flutter: ^2.8.3
  path: ^1.9.1
  connectivity_plus: ^6.1.1
  shared_preferences: ^2.5.3
  flutter_svg: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
    backgroundColor: "#ffffff"
    themeColor: "#ffffff"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/app_icon.png"
  linux:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/media/
