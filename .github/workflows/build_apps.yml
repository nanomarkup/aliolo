name: Multi-Platform Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SUPABASE_URL: https://mltdjjszycfmokwqsqxm.supabase.co
  SUPABASE_ANON_KEY: sb_publishable_DCMw0z92Lr2nzC83sOQJXw_G1fYdEb3

jobs:
  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }}
      - name: Fix Web Build (Python Script)
        run: python3 fix_web_build.py
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aliolo-web
          path: build/web/

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }}
      - run: flutter build appbundle --release --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aliolo-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aliolo-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build_linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev libasound2-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Create Linux Bundle (Zip)
        run: |
          cd build/linux/x64/release/bundle/
          zip -r ../../../../../aliolo-linux.zip .
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aliolo-linux
          path: aliolo-linux.zip

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aliolo-windows
          path: build\windows\x64\runner\Release\

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }}
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aliolo-macos
          path: build/macos/Build/Products/Release/

  build_ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aliolo-ios
          path: build/ios/iphoneos/
